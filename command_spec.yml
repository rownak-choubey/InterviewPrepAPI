version: 0.1
component: deploy
timeoutInSeconds: 600
shell: bash
failImmediatelyOnError: true

env:
  variables:
    OCIR_REGION: ap-mumbai-1
    OCIR_REGISTRY: mumbai.ocir.io
  vaultVariables:
    OCIR_USERNAME: <OCIR_USERNAME_SECRET_OCID>
    OCIR_AUTH_TOKEN: <OCIR_AUTH_TOKEN_SECRET_OCID>
    VM_SSH_KEY: <VM_SSH_PRIVATE_KEY_SECRET_OCID>
    VM_HOST: <VM_HOST_IP_SECRET_OCID>
    VM_USER: <VM_USER_SECRET_OCID>
    POSTGRES_PASSWORD: <POSTGRES_PASSWORD_SECRET_OCID>
    OCI_VAULT_ID: <OCI_VAULT_ID_SECRET_OCID>

steps:
  - type: Command
    name: Setup SSH
    command: |
      echo "Setting up SSH..."
      mkdir -p ~/.ssh
      echo "${VM_SSH_KEY}" > ~/.ssh/id_rsa
      chmod 600 ~/.ssh/id_rsa
      ssh-keyscan -H ${VM_HOST} >> ~/.ssh/known_hosts 2>/dev/null
      echo "SSH configured."

  - type: Command
    name: Deploy to VM
    command: |
      echo "Deploying to VM ${VM_HOST}..."
      ssh -o StrictHostKeyChecking=no ${VM_USER}@${VM_HOST} << 'DEPLOY_EOF'
        set -e

        cd /home/${VM_USER}/interviewprep

        echo "Logging in to OCIR..."
        echo "${OCIR_AUTH_TOKEN}" | docker login ${OCIR_REGISTRY} -u "${OCIR_USERNAME}" --password-stdin

        echo "Pulling latest image..."
        docker compose pull api

        echo "Starting services..."
        POSTGRES_DB="${POSTGRES_DB:-interviewprep_db}" \
        POSTGRES_USER="${POSTGRES_USER:-interviewprep}" \
        POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
        OCI_VAULT_ID="${OCI_VAULT_ID}" \
        docker compose up -d --remove-orphans

        echo "Cleaning up old images..."
        docker image prune -f

        echo "Deploy complete."
DEPLOY_EOF

  - type: Command
    name: Cleanup SSH
    command: |
      rm -rf ~/.ssh/id_rsa
      echo "SSH cleanup complete."
    onFailure:
      - type: Command
        command: |
          rm -rf ~/.ssh/id_rsa
          echo "SSH cleanup on failure complete."
