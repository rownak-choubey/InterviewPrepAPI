version: 0.1
component: build
timeoutInSeconds: 1800
shell: bash
failImmediatelyOnError: true

env:
  variables:
    OCIR_REGION: ap-mumbai-1
    OCIR_REGISTRY: mumbai.ocir.io
  vaultVariables:
    OCIR_USERNAME: <OCIR_USERNAME_SECRET_OCID>
    OCIR_AUTH_TOKEN: <OCIR_AUTH_TOKEN_SECRET_OCID>
    GITHUB_PAT: <GITHUB_PAT_SECRET_OCID>
  exportedVariables:
    - OCIR_IMAGE_TAG
    - OCIR_IMAGE_PATH

steps:
  - type: Command
    name: Set Image Tag
    command: |
      export OCIR_IMAGE_TAG=${OCI_PRIMARY_SOURCE_COMMIT_HASH:0:7}
      echo "OCIR_IMAGE_TAG=$OCIR_IMAGE_TAG" >> $OCI_EXPORT_VARIABLES
      echo "OCIR_IMAGE_PATH=${OCIR_REGISTRY}/${OCIR_USERNAME}/interviewprep-api" >> $OCI_EXPORT_VARIABLES
      echo "Image tag: $OCIR_IMAGE_TAG"

  - type: Command
    name: Build Docker Image
    command: |
      echo "Building Docker image..."
      podman build -t interviewprep-api:${OCIR_IMAGE_TAG} .
      podman tag interviewprep-api:${OCIR_IMAGE_TAG} interviewprep-api:latest
      echo "Build complete."

  - type: Command
    name: Login to OCIR
    command: |
      echo "Logging in to OCIR..."
      echo "${OCIR_AUTH_TOKEN}" | podman login ${OCIR_REGISTRY} -u "${OCIR_USERNAME}" --password-stdin
      echo "Login successful."

  - type: Command
    name: Push to OCIR
    command: |
      echo "Tagging image for OCIR..."
      podman tag interviewprep-api:${OCIR_IMAGE_TAG} ${OCIR_REGISTRY}/${OCIR_USERNAME}/interviewprep-api:${OCIR_IMAGE_TAG}
      podman tag interviewprep-api:latest ${OCIR_REGISTRY}/${OCIR_USERNAME}/interviewprep-api:latest

      echo "Pushing to OCIR..."
      podman push ${OCIR_REGISTRY}/${OCIR_USERNAME}/interviewprep-api:${OCIR_IMAGE_TAG}
      podman push ${OCIR_REGISTRY}/${OCIR_USERNAME}/interviewprep-api:latest

      echo "Push complete. Image: ${OCIR_REGISTRY}/${OCIR_USERNAME}/interviewprep-api:${OCIR_IMAGE_TAG}"

  - type: Command
    name: Cleanup
    command: |
      podman rmi interviewprep-api:${OCIR_IMAGE_TAG} interviewprep-api:latest || true
      echo "Cleanup complete."
